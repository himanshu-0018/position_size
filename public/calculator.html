<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Offset Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; }
        
        .custom-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            color: white;
            border-radius: 6px;
            padding: 10px 14px;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        .custom-input:focus { border-color: #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.2); }
        
        /* Segmented Toggle Control */
        .toggle-container {
            display: flex;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        .toggle-btn {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            color: #64748b;
        }
        .toggle-btn.active-long { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .toggle-btn.active-short { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Dynamic Offset Calculator
            </h1>
            <p class="text-slate-400 text-xs mt-1">Real-time Long/Short target mapping</p>
        </div>

        <div class="card p-5 mb-8 shadow-lg">
            <h2 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
                <span>⚡</span> Add New Coin
            </h2>
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="w-full md:w-1/3">
                    <label class="text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Symbol</label>
                    <input type="text" id="addSymbol" class="custom-input uppercase font-mono" placeholder="e.g., BTCUSD">
                </div>
                <div class="w-full md:w-1/3">
                    <label class="text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Fixed Value Offset</label>
                    <input type="number" id="addValue" step="any" class="custom-input font-mono" placeholder="e.g., 100">
                </div>
                <div class="w-full md:w-1/3">
                    <button onclick="injectCoin()" class="w-full py-2.5 rounded bg-sky-500/20 border border-sky-500/50 text-sky-400 text-sm font-bold hover:bg-sky-500/40 transition h-[42px]">
                        ADD TO DASHBOARD
                    </button>
                </div>
            </div>
        </div>

        <div id="calcGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            </div>
    </div>

    <script>
        // Array to store our active coin calculators
        let activeCoins = [];

        function injectCoin() {
            const symbolInput = document.getElementById('addSymbol');
            const valueInput = document.getElementById('addValue');
            
            const symbol = symbolInput.value.toUpperCase().trim();
            const value = parseFloat(valueInput.value);

            if (!symbol || isNaN(value)) {
                alert("Please enter a valid Symbol and Fixed Value.");
                return;
            }

            // Create a unique ID for this specific card
            const id = Date.now();
            
            activeCoins.push({
                id: id,
                symbol: symbol,
                fixedValue: value,
                direction: 'LONG' // Default to long
            });

            // Clear inputs
            symbolInput.value = '';
            valueInput.value = '';

            renderGrid();
        }

        // Switches direction and forces a math recalculation
        function setDirection(id, direction) {
            const coin = activeCoins.find(c => c.id === id);
            if (coin) {
                coin.direction = direction;
                renderGrid(); 
                
                // Immediately recalculate if there's already an entry price typed in
                const entryInput = document.getElementById(`entry_${id}`);
                if (entryInput && entryInput.value) {
                    calculateLive(id);
                }
            }
        }

        // The core real-time math engine
        function calculateLive(id) {
            const coin = activeCoins.find(c => c.id === id);
            const entryInput = document.getElementById(`entry_${id}`);
            const resultDisplay = document.getElementById(`result_${id}`);

            if (!coin || !entryInput || !resultDisplay) return;

            const entryPrice = parseFloat(entryInput.value);

            // If input is empty or invalid, show placeholder
            if (isNaN(entryPrice)) {
                resultDisplay.innerText = "---";
                resultDisplay.className = "text-2xl font-bold font-mono text-slate-500";
                return;
            }

            let result = 0;
            // The Math logic: Long = Entry - Offset | Short = Entry + Offset
            if (coin.direction === 'LONG') {
                result = entryPrice - coin.fixedValue;
                resultDisplay.className = "text-2xl font-bold font-mono text-emerald-400";
            } else {
                result = entryPrice + coin.fixedValue;
                resultDisplay.className = "text-2xl font-bold font-mono text-rose-400";
            }

            // Print the live result
            resultDisplay.innerText = result.toFixed(2); 
        }

        function renderGrid() {
            const grid = document.getElementById('calcGrid');
            grid.innerHTML = '';

            activeCoins.forEach(coin => {
                const cardHTML = `
                    <div class="card p-5 relative overflow-hidden group">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-xl font-black text-white tracking-wider">${coin.symbol}</h2>
                                <p class="text-[0.65rem] text-slate-400 mt-0.5 uppercase tracking-wide">Fixed Offset: <span class="text-sky-400 font-bold">${coin.fixedValue}</span></p>
                            </div>
                            
                            <div class="toggle-container w-32">
                                <div onclick="setDirection(${coin.id}, 'LONG')" 
                                     class="toggle-btn ${coin.direction === 'LONG' ? 'active-long' : ''}">LONG</div>
                                <div onclick="setDirection(${coin.id}, 'SHORT')" 
                                     class="toggle-btn ${coin.direction === 'SHORT' ? 'active-short' : ''}">SHORT</div>
                            </div>
                        </div>

                        <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700/50">
                            <label class="text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider mb-2 block">Live Entry Price</label>
                            
                            <input type="number" id="entry_${coin.id}" step="any" oninput="calculateLive(${coin.id})" 
                                   class="custom-input font-mono text-lg mb-4 text-white" placeholder="0.00">
                            
                            <div class="flex justify-between items-center border-t border-slate-700/50 pt-3">
                                <span class="text-xs font-bold text-slate-400 uppercase">Target Price</span>
                                <span id="result_${coin.id}" class="text-2xl font-bold font-mono text-slate-500">---</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }
    </script>
</body>
</html>
